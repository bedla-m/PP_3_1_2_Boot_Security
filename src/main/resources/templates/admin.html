<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <title>Users</title>
</head>

<div style="text-align: right; padding: 10px;">
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Выйти</button>
    </form>
</div>
<body>

<h2>Users</h2>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Surname</th>
        <th>Age</th>
        <th>Role</th>
        <th>Edit</th>
        <th>Remove</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td>
            <a th:href="@{/user(id=${user.id})}"
               th:text="${user.id}"></a>
        </td>
        <td th:text="${user.name}"></td>
        <td th:text="${user.surname}"></td>
        <td th:text="${user.age}"></td>
        <td>
            <span th:each="role : ${user.roles}"
                  th:text="${role.roleName}"></span>
        </td>
        <td>
            <a th:href="@{/edit(id=${user.id})}">
                <input type="hidden" name="id" th:value="${user.id}"/>
                <button type="button">Edit</button>
            </a>
        </td>
        <td>
            <form th:action="@{/delete}" th:object="${user}" method="post">
                <input type="hidden" name="id" th:value="${user.id}"/>
                <button type="submit">remove</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>


<h3>Add New User</h3>

<form th:action="@{/save}" th:object="${user}" method="post">
    <input type="hidden" th:field="*{id}"/>
    <input type="text" th:field="*{name}" placeholder="user.name"/>
    <input type="text" th:field="*{surname}" placeholder="Surname"/>
    <input type="number" th:field="*{age}" placeholder="Number"/>
    <input type="text" th:field="*{username}" placeholder="Username"/>
    <input type="text" th:field="*{password}" placeholder="Password"/>
    <div>
        <label>Roles:</label>
        <div th:each="role : ${roles}">
            <input type="checkbox"
                   name="roleIds"
                   th:value="${role.id}"
                   th:checked="${user.roles.contains(role)}"/>
            <label th:text="${role.roleName}"></label>
        </div>
    </div>
    <button type="submit">Add</button>
</form>
</body>
</html>
